<!DOCTYPE html>
<html lang="de" data-theme="default">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG Dual View</title>
  <style>
    /* === Reset === */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* === Theme Variables === */
    :root {
      --theme-sky: #c5d8eb;
      --theme-water: #62acdf;
      --theme-veg-light: #bbe7d3;
      --theme-veg-mid: #5db19c;
      --theme-veg-dark: #1f697c;
      --theme-ground: #70af9d;
      --ui-bg: #eef2f6;
      --ui-header-bg: #ffffff;
      --ui-text: #212b42;
      --ui-accent: #212b42;
    }

    [data-theme="autumn"] {
      --theme-sky: #e8d5b0;
      --theme-water: #a07840;
      --theme-veg-light: #e8c490;
      --theme-veg-mid: #c0651a;
      --theme-veg-dark: #8b3a12;
      --theme-ground: #b8854a;
      --ui-bg: #f5ede0;
      --ui-accent: #8b3a12;
    }

    [data-theme="winter"] {
      --theme-sky: #d4e8f0;
      --theme-water: #9ec4d8;
      --theme-veg-light: #c8dce8;
      --theme-veg-mid: #78aabf;
      --theme-veg-dark: #4a7a94;
      --theme-ground: #8aabb8;
      --ui-bg: #ebf0f3;
      --ui-accent: #4a7a94;
    }

    /* === SVG Theme Overrides — st* classes (SVG-A style block) === */
    .st3,
    .st4 {
      fill: var(--theme-sky) !important;
    }

    .st10 {
      fill: var(--theme-water) !important;
    }

    .st11 {
      fill: var(--theme-veg-light) !important;
    }

    .st13,
    .st15 {
      fill: var(--theme-veg-mid) !important;
    }

    .st14 {
      fill: var(--theme-veg-dark) !important;
    }

    .st34 {
      fill: var(--theme-ground) !important;
    }

    /* === SVG Theme Overrides — semantic classes (SVG-B style block) === */
    .blue_light {
      fill: var(--theme-sky) !important;
    }

    .blue {
      fill: var(--theme-water) !important;
    }

    .green_light {
      fill: var(--theme-veg-light) !important;
    }

    .green_med {
      fill: var(--theme-veg-mid) !important;
    }

    .green_dark {
      fill: var(--theme-veg-dark) !important;
    }

    /* === Layout === */

    /* --- 1. IMPORTS & FONTS --- */
    @import url('https://fonts.googleapis.com/css2?family=Dosis:wght@200..800&display=swap');

    .body {
      font-family: Dosis, Quicksand, Quicksand-fallback, Helvetica, sans-serif;
      background: transparent;
      width: 80%;
      margin: auto;
      max-width: 1440px;
      transition: background 0.4s ease;
      border-radius: 23px;
      overflow: hidden;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      background: var(--ui-header-bg);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
      border-radius: 23px 23px 0 0;
    }

    header label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      opacity: 0.45;
    }

    header select {
      font-size: 13px;
      padding: 5px 10px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      border-radius: 6px;
      background: white;
      cursor: pointer;
      outline: none;
      color: var(--ui-text);
      transition: border-color 0.2s;
    }

    header select:focus {
      border-color: var(--ui-accent);
    }

    /* === Dual Pane === */
    main {
      padding: 24px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
      background-color: var(--ui-bg);
      border-radius: 0 0 23px 23px;
    }

    .mal-svg-pane {
      flex: 1;
      min-width: 0;
    }

    .mal-pane-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .mal-svg-pane svg {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    /* === Interactive SVG Groups === */
    [id*="HOVER_"],
    [id*="BTN_"] {
      cursor: pointer;
      transition: opacity 0.25s ease;
    }

    /* === ROTATE Animation === */
    [id*="ROTATE_"] {
      transform-box: fill-box;
      transform-origin: center;
      animation: mal-spin 12s linear infinite;
    }

    @keyframes mal-spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* === Overlay === */
    #mal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #mal-overlay[hidden] {
      display: none;
    }

    #mal-overlay-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(10, 20, 40, 0.5);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    #mal-overlay-card {
      position: relative;
      z-index: 1;
      background: white;
      border-radius: 16px;
      padding: 40px 44px;
      max-width: 440px;
      width: 90%;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.2);
      animation: mal-card-in 0.2s ease;
    }

    @keyframes mal-card-in {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    #mal-overlay-close {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      color: #999;
      padding: 5px 9px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }

    #mal-overlay-close:hover {
      background: rgba(0, 0, 0, 0.07);
      color: #333;
    }

    #mal-card-source {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 10px;
    }

    #mal-card-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1a2233;
    }

    #mal-card-description {
      font-size: 15px;
      line-height: 1.65;
      color: #666;
      margin-bottom: 28px;
    }

    #mal-card-link {
      display: inline-block;
      padding: 11px 22px;
      background: var(--ui-accent);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    #mal-card-link:hover {
      opacity: 0.85;
    }
  </style>

</head>

  <!-- Overlay / Info-Card -->
  <div id="mal-overlay" hidden>
    <div id="mal-overlay-backdrop"></div>
    <div id="mal-overlay-card" role="dialog" aria-modal="true" aria-labelledby="mal-card-title">
      <button id="mal-overlay-close" aria-label="Schliessen">&times;</button>
      <p id="mal-card-source"></p>
      <h2 id="mal-card-title"></h2>
      <p id="mal-card-description"></p>
      <a id="mal-card-link" href="#" target="_blank" rel="noopener noreferrer"></a>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      // ── Card Configuration ────────────────────────────────────────────────
      // Keys = original SVG group id (before namespacing).
      // Works for both SVG-A and SVG-B as long as semantic IDs match.
      var MAL_CARD_CONFIG = {
        'HOVER_gardening': {
          title: 'Gardening',
          description: 'Placeholder description for the gardening area.',
          url: 'https://example.com/gardening',
          urlLabel: 'Mehr erfahren'
        },
        'HOVER_gardening1': {
          title: 'Gardening (Alt)',
          description: 'Placeholder description for the secondary gardening area.',
          url: 'https://example.com/gardening',
          urlLabel: 'Mehr erfahren'
        },
        'HOVER_farm': {
          title: 'Farm',
          description: 'Placeholder description for the farm area.',
          url: 'https://example.com/farm',
          urlLabel: 'Mehr erfahren'
        },
        'HOVER_wheatfield': {
          title: 'Wheatfield',
          description: 'Placeholder description for the wheatfield area.',
          url: 'https://example.com/wheatfield',
          urlLabel: 'Mehr erfahren'
        },
        'HOVER_applecoins': {
          title: 'Apple Coins',
          description: 'Placeholder description for the apple coins area.',
          url: 'https://example.com/applecoins',
          urlLabel: 'Mehr erfahren'
        },
        // SVG-A legacy IDs (Illustrator-escaped)
        'HOVER_x5F_gardening': {
          title: 'Gardening',
          description: 'Placeholder description for the gardening area.',
          url: 'https://example.com/gardening',
          urlLabel: 'Mehr erfahren'
        },
        'HOVER_x5F_applecoins': {
          title: 'Apple Coins',
          description: 'Placeholder description for the apple coins area.',
          url: 'https://example.com/applecoins',
          urlLabel: 'Mehr erfahren'
        },
        'HOVER_x5F_wheatfield': {
          title: 'Wheatfield',
          description: 'Placeholder description for the wheatfield area.',
          url: 'https://example.com/wheatfield',
          urlLabel: 'Mehr erfahren'
        },
        'BTN_appleharvest': {
          title: 'Apple Harvest',
          description: 'The apple harvest season — workers, barrows and orchard trees in action.',
          url: 'https://example.com/appleharvest',
          urlLabel: 'Zur Seite'
        }
      };

      // ── ID Namespacing Utility ────────────────────────────────────────────
      // Prefixes all IDs inside an SVG container and updates internal references.
      // Stores the original id on each element via data-mal-id for config lookup.
      function MAL_namespaceSvg(containerEl, prefix) {
        var MAL_svgEl = containerEl.querySelector('svg');
        if (!MAL_svgEl) return;

        var MAL_XLINK = 'http://www.w3.org/1999/xlink';

        // ── Step 1: Collect all IDs ───────────────────────────────────────
        var MAL_ids = {};
        MAL_svgEl.querySelectorAll('[id]').forEach(function (el) {
          MAL_ids[el.id] = true;
          el.dataset.malId = el.id;
        });

        // ── Step 2: Collect CSS class names that reference url(#...) ─────
        // Both SVGs share .st* class names but with different url(#id) values.
        // The later SVG's <style> block wins in the cascade, breaking the earlier SVG.
        // Fix: prefix these class names per SVG so they never collide.
        var MAL_urlClasses = new Set();
        MAL_svgEl.querySelectorAll('style').forEach(function (styleEl) {
          var MAL_re = /\.([a-zA-Z][a-zA-Z0-9_-]*)[^{]*\{[^}]*url\(#[^)]+\)[^}]*\}/g;
          var MAL_m;
          while ((MAL_m = MAL_re.exec(styleEl.textContent)) !== null) {
            MAL_urlClasses.add(MAL_m[1]);
          }
        });

        // ── Step 3: Rename all IDs ────────────────────────────────────────
        MAL_svgEl.querySelectorAll('[id]').forEach(function (el) {
          el.id = prefix + el.id;
        });

        // ── Step 4: Update <style> blocks ────────────────────────────────
        // a) Replace url(#id) references with prefixed IDs
        // b) Prefix url-using class names so they no longer collide with other SVG
        MAL_svgEl.querySelectorAll('style').forEach(function (styleEl) {
          var MAL_css = styleEl.textContent;
          // a) url(#id) references
          MAL_css = MAL_css.replace(/url\(#([^)]+)\)/g, function (match, id) {
            return MAL_ids[id] ? 'url(#' + prefix + id + ')' : match;
          });
          // b) class name prefixing — match .classname followed by space, comma, colon or {
          MAL_urlClasses.forEach(function (cls) {
            var MAL_re = new RegExp(
              '(\\.)' + cls.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(?=[\\s,:{])',
              'g'
            );
            MAL_css = MAL_css.replace(MAL_re, '$1' + prefix + cls);
          });
          styleEl.textContent = MAL_css;
        });

        // ── Step 5: Update href / xlink:href on all elements ─────────────
        MAL_svgEl.querySelectorAll('*').forEach(function (el) {
          var MAL_href = el.getAttribute('href');
          if (MAL_href && MAL_href.charAt(0) === '#' && MAL_ids[MAL_href.slice(1)]) {
            el.setAttribute('href', '#' + prefix + MAL_href.slice(1));
          }
          var MAL_xlink = el.getAttributeNS(MAL_XLINK, 'href');
          if (MAL_xlink && MAL_xlink.charAt(0) === '#' && MAL_ids[MAL_xlink.slice(1)]) {
            el.setAttributeNS(MAL_XLINK, 'href', '#' + prefix + MAL_xlink.slice(1));
          }
        });

        // ── Step 6: Update url(#...) in presentation + inline style attrs ─
        var MAL_urlAttrs = ['clip-path', 'fill', 'filter', 'mask',
          'marker-start', 'marker-mid', 'marker-end', 'stroke'];
        MAL_svgEl.querySelectorAll('*').forEach(function (el) {
          MAL_urlAttrs.forEach(function (attr) {
            var val = el.getAttribute(attr);
            if (val && val.indexOf('url(#') !== -1) {
              el.setAttribute(attr, val.replace(/url\(#([^)]+)\)/g, function (match, id) {
                return MAL_ids[id] ? 'url(#' + prefix + id + ')' : match;
              }));
            }
          });
          if (el.getAttribute('style') && el.getAttribute('style').indexOf('url(#') !== -1) {
            el.setAttribute('style', el.getAttribute('style').replace(/url\(#([^)]+)\)/g,
              function (match, id) {
                return MAL_ids[id] ? 'url(#' + prefix + id + ')' : match;
              }
            ));
          }
        });

        // ── Step 7: Prefix url-using class names on elements ─────────────
        if (MAL_urlClasses.size > 0) {
          MAL_svgEl.querySelectorAll('[class]').forEach(function (el) {
            var MAL_cls = el.getAttribute('class').split(/\s+/);
            var MAL_changed = false;
            var MAL_next = MAL_cls.map(function (c) {
              if (MAL_urlClasses.has(c)) { MAL_changed = true; return prefix + c; }
              return c;
            });
            if (MAL_changed) el.setAttribute('class', MAL_next.join(' '));
          });
        }
      }

      // ── Hover System (per SVG pane) ───────────────────────────────────────
      // Each SVG manages its own opacity group independently.
      function MAL_initHover(containerEl, sourceLabel) {
        var MAL_els = Array.from(
          containerEl.querySelectorAll('[id*="HOVER_"], [id*="BTN_"]')
        );

        // ── Group Map ──────────────────────────────────────────────────────
        // Elements belonging to the same hover group highlight together.
        // Grouping rule (checked in order):
        //   1. data-name matches a HOVER_/BTN_ pattern  → use data-name as group key
        //      (Illustrator sets data-name on duplicate/child layers of the same area)
        //   2. Otherwise                                 → own original id is the group key
        var MAL_groups = {};   // groupKey → [elements]
        var MAL_elGroup = [];  // parallel to MAL_els: groupKey per element

        MAL_els.forEach(function (el) {
          var MAL_ownId = el.dataset.malId || el.id;
          var MAL_dname = el.getAttribute('data-name') || '';
          // Grouping priority:
          // 1. data-name starts with HOVER_/BTN_ → Illustrator explicit group link
          // 2. Strip trailing digits from own id → HOVER_gardening1 → HOVER_gardening
          //    Covers exports where Illustrator omits data-name on numbered duplicate layers
          var MAL_key = /^(HOVER_|BTN_)/.test(MAL_dname)
            ? MAL_dname
            : MAL_ownId.replace(/\d+$/, '');

          if (!MAL_groups[MAL_key]) MAL_groups[MAL_key] = [];
          MAL_groups[MAL_key].push(el);
          MAL_elGroup.push(MAL_key);
        });

        // ── Events ────────────────────────────────────────────────────────
        MAL_els.forEach(function (MAL_el, MAL_i) {
          var MAL_activeKey = MAL_elGroup[MAL_i];

          MAL_el.addEventListener('mouseenter', function () {
            MAL_els.forEach(function (e, j) {
              e.style.opacity = (MAL_elGroup[j] === MAL_activeKey) ? '1' : '0.5';
            });
          });

          MAL_el.addEventListener('mouseleave', function () {
            MAL_els.forEach(function (e) { e.style.opacity = '1'; });
          });

          MAL_el.addEventListener('click', function () {
            // Config is keyed by group key — all members of a group share one card
            var MAL_config = MAL_CARD_CONFIG[MAL_activeKey];
            if (!MAL_config) return;

            document.getElementById('mal-card-source').textContent = sourceLabel;
            document.getElementById('mal-card-title').textContent = MAL_config.title;
            document.getElementById('mal-card-description').textContent = MAL_config.description;

            var MAL_link = document.getElementById('mal-card-link');
            MAL_link.href = MAL_config.url;
            MAL_link.textContent = MAL_config.urlLabel;

            document.getElementById('mal-overlay').hidden = false;
            document.getElementById('mal-overlay-close').focus();
          });
        });
      }

      // ── Overlay Close ─────────────────────────────────────────────────────
      function MAL_closeOverlay() {
        document.getElementById('mal-overlay').hidden = true;
      }

      document.getElementById('mal-overlay-close').addEventListener('click', MAL_closeOverlay);
      document.getElementById('mal-overlay-backdrop').addEventListener('click', MAL_closeOverlay);
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') MAL_closeOverlay();
      });

      // ── Theme Switcher ────────────────────────────────────────────────────
      document.getElementById('mal-theme-select').addEventListener('change', function (e) {
        document.documentElement.setAttribute('data-theme', e.target.value);
      });

      // ── Init ──────────────────────────────────────────────────────────────
      var MAL_paneA = document.getElementById('mal-svg-a');
      var MAL_paneB = document.getElementById('mal-svg-b');

      MAL_namespaceSvg(MAL_paneA, 'svga_');
      MAL_namespaceSvg(MAL_paneB, 'svgb_');

      MAL_initHover(MAL_paneA, 'Original');
      MAL_initHover(MAL_paneB, 'New Layers');

    }());
  </script>
